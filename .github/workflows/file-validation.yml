name: File Validation

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  check-files:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files: |
            **.js
            **.css
            **.html

      - name: Check for forbidden files
        run: |
          # Check for ZIP files
          if git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep -E '\.zip$'; then
            echo "Error: ZIP files should not be committed"
            exit 1
          fi

          # Check for large files (>1MB)
          git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | while read file; do
            if [ -f "$file" ]; then
              size=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file")
              if [ $size -gt 1048576 ]; then
                echo "Error: File $file is larger than 1MB ($size bytes)"
                exit 1
              fi
            fi
          done

      - name: Check if tests are included for JS changes
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          changed_js=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep '\.js$' | grep -v '\.test\.js$' || true)
          if [ -n "$changed_js" ]; then
            test_files=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep '\.test\.js$' || true)
            if [ -z "$test_files" ]; then
              echo "::warning::JavaScript files changed but no test files included"
            fi
          fi
