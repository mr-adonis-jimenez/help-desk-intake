name: Automated Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for common issues
        run: |
          echo "=== Checking for debug statements ==="
          if grep -rn "console\.log\|debugger" --include="*.js" --include="*.ts" --include="*.tsx" src/ 2>/dev/null; then
            echo "::warning::Found debug statements in source files"
          fi
          
          echo "=== Checking for TODO/FIXME ==="
          if grep -rn "TODO\|FIXME\|HACK\|XXX" --include="*.js" --include="*.ts" --include="*.tsx" src/ 2>/dev/null; then
            echo "::notice::Found TODO/FIXME comments — consider addressing them"
          fi
          
          echo "✅ Code review checks complete"
